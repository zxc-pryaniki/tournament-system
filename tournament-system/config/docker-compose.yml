version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: tournament_postgres
    environment:
      POSTGRES_DB: tournament_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tournament_backend
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/tournament_db
